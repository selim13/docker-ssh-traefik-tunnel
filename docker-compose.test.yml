services:
  tunnel:
    build: .
    container_name: sshd-web-tunnel-test
    ports:
      - "2222:22"
    volumes:
      - ./test/volumes/ssh:/etc/ssh                             # host keys persist across restarts
      - ./test/keys/id_ed25519.pub:/conf.d/authorized_keys:ro   # public key for the tunnel user
      - ./test/volumes/traefik:/conf.d/traefik                  # inspect generated dynamic.yml here
    environment:
      TUNNEL_HOST: "sshd-web-tunnel-test"
      AUTO_MAP_BASE_DOMAIN: "tunnel.example.com"
      AUTO_MAP_ENABLED: "true"
      AUTO_MAP_SCHEME: "http"
      PORT_MAPPINGS: "8080:https://https-test.example.com,8081:https://http-test.example.com"
      EXCLUDE_PORTS: ""
      TRAEFIK_HTTPS_ENTRYPOINT: "websecure"
      TRAEFIK_HTTP_ENTRYPOINT: "web"
      TRAEFIK_CERT_RESOLVER: ""
      DEBUG: "false"
